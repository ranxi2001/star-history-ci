name: Star History CI
description: Generate star-history SVGs and publish stable light/dark URLs from an output branch.
author: ranxi2001

branding:
  icon: star
  color: yellow

inputs:
  repos:
    description: Comma-separated owner/repo list. Defaults to the repository that runs the workflow.
    required: false
    default: ${{ github.repository }}
  token:
    description: PAT owned by a repository admin or collaborator and used to read stargazer data.
    required: true
  github-token:
    description: GitHub token used to publish the generated SVGs to the output branch.
    required: false
    default: ${{ github.token }}
  output-dir:
    description: Temporary directory where rendered SVGs are written before publishing.
    required: false
    default: star-history
  publish-branch:
    description: Branch that will host the generated SVG files.
    required: false
    default: output
  file-prefix:
    description: Stable SVG filename prefix.
    required: false
    default: star-history
  type:
    description: Chart mode passed to the renderer. Usually Date or Timeline.
    required: false
    default: Date
  themes:
    description: Comma-separated themes to render.
    required: false
    default: light,dark
  width:
    description: SVG width in pixels.
    required: false
    default: "800"
  force-orphan:
    description: Whether to publish the output branch as an orphan branch.
    required: false
    default: "true"

outputs:
  light:
    description: Relative path to the stable light SVG.
    value: ${{ steps.normalize.outputs.light }}
  dark:
    description: Relative path to the stable dark SVG.
    value: ${{ steps.normalize.outputs.dark }}
  light_url:
    description: Raw GitHub URL for the stable light SVG.
    value: ${{ steps.normalize.outputs.light_url }}
  dark_url:
    description: Raw GitHub URL for the stable dark SVG.
    value: ${{ steps.normalize.outputs.dark_url }}
  files:
    description: Newline-separated list of stable SVG paths.
    value: ${{ steps.normalize.outputs.files }}

runs:
  using: composite
  steps:
    - name: Validate stargazer token
      shell: bash
      env:
        STAR_HISTORY_TOKEN: ${{ inputs.token }}
      run: |
        if [[ -z "$STAR_HISTORY_TOKEN" ]]; then
          echo "::error::The token input is required. Pass a PAT owned by a repository admin or collaborator."
          exit 1
        fi

    - name: Set up Node
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: "24"

    - name: Install renderer dependencies
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
      run: cd "$ACTION_PATH/renderer" && npm ci --no-audit --no-fund

    - name: Render star history
      id: render
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        REPOS: ${{ inputs.repos }}
        OUTPUT_DIR: ${{ inputs.output-dir }}
        FILE_PREFIX: ${{ inputs.file-prefix }}
        TYPE: ${{ inputs.type }}
        THEMES: ${{ inputs.themes }}
        WIDTH: ${{ inputs.width }}
        ACTION_PATH: ${{ github.action_path }}
      run: bash "$ACTION_PATH/scripts/render-charts.sh"

    - name: Normalize stable filenames
      id: normalize
      shell: bash
      env:
        OUTPUT_DIR: ${{ inputs.output-dir }}
        FILE_PREFIX: ${{ inputs.file-prefix }}
        THEMES: ${{ inputs.themes }}
        REPOSITORY: ${{ github.repository }}
        PUBLISH_BRANCH: ${{ inputs.publish-branch }}
      run: bash "${{ github.action_path }}/scripts/normalize-star-history.sh"

    - name: Publish output branch
      shell: bash
      env:
        PUBLISH_TOKEN: ${{ inputs.github-token }}
        PUBLISH_DIR: ${{ inputs.output-dir }}
        PUBLISH_BRANCH: ${{ inputs.publish-branch }}
        FORCE_ORPHAN: ${{ inputs.force-orphan }}
        REPOSITORY: ${{ github.repository }}
        SERVER_URL: ${{ github.server_url }}
        SOURCE_SHA: ${{ github.sha }}
        ACTION_PATH: ${{ github.action_path }}
      run: bash "$ACTION_PATH/scripts/publish-output.sh"
